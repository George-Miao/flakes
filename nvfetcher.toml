[nordic-wallpaper]
src.git = "https://github.com/linuxdotexe/nordic-wallpapers"
fetch.github = "linuxdotexe/nordic-wallpapers"

[pop-wallpaper]
src.github = "George-Miao/wallpaper"
fetch.github = "George-Miao/wallpaper"

[vscode-linux-x64-stable]
src.cmd = """curl -Ls -o /dev/null -w %{url_effective} 'https://update.code.visualstudio.com/latest/linux-x64/stable'"""
fetch.tarball = "$ver"

[vscode-linux-x64-insider]
src.cmd = """curl -Ls -o /dev/null -w %{url_effective} 'https://update.code.visualstudio.com/latest/linux-x64/insider'"""
fetch.tarball = "$ver"

[vscode-linux-arm64-stable]
src.cmd = """curl -Ls -o /dev/null -w %{url_effective} 'https://update.code.visualstudio.com/latest/linux-arm64/stable'"""
fetch.tarball = "$ver"

[vscode-linux-arm64-insider]
src.cmd = """curl -Ls -o /dev/null -w %{url_effective} 'https://update.code.visualstudio.com/latest/linux-arm64/insider'"""
fetch.tarball = "$ver"

[vscode-darwin-stable]
src.cmd = """curl -Ls -o /dev/null -w %{url_effective} 'https://update.code.visualstudio.com/latest/darwin/stable'"""
fetch.tarball = "$ver"

[vscode-darwin-insider]
src.cmd = """curl -Ls -o /dev/null -w %{url_effective} 'https://update.code.visualstudio.com/latest/darwin/insider'"""
fetch.tarball = "$ver"

[verus-linux-x64]
src.cmd = """curl -s https://api.github.com/repos/verus-lang/verus/releases/latest | jq -r '.tag_name | split("/") | last'"""
fetch.tarball = "https://github.com/verus-lang/verus/releases/download/release%2F$ver/verus-$ver-x86-linux.zip"

[verus-darwin-x64]
src.cmd = """curl -s https://api.github.com/repos/verus-lang/verus/releases/latest | jq -r '.tag_name | split("/") | last'"""
fetch.tarball = "https://github.com/verus-lang/verus/releases/download/release%2F$ver/verus-$ver-x86-macos.zip"

[verus-darwin-arm64]
src.cmd = """curl -s https://api.github.com/repos/verus-lang/verus/releases/latest | jq -r '.tag_name | split("/") | last'"""
fetch.tarball = "https://github.com/verus-lang/verus/releases/download/release%2F$ver/verus-$ver-arm64-macos.zip"

[verusfmt]
src.github = "verus-lang/verusfmt"
fetch.github = "verus-lang/verusfmt"

[obscura-browser-bin-linux-x64]
src.github = "h4ckf0r0day/obscura"
fetch.tarball = "https://github.com/h4ckf0r0day/obscura/releases/download/$ver/obscura-x86_64-linux.tar.gz"

[obscura-browser-bin-linux-arm64]
src.github = "h4ckf0r0day/obscura"
fetch.tarball = "https://github.com/h4ckf0r0day/obscura/releases/download/$ver/obscura-aarch64-linux.tar.gz"

[obscura-browser-bin-darwin-x64]
src.github = "h4ckf0r0day/obscura"
fetch.tarball = "https://github.com/h4ckf0r0day/obscura/releases/download/$ver/obscura-x86_64-macos.tar.gz"

[obscura-browser-bin-darwin-arm64]
src.github = "h4ckf0r0day/obscura"
fetch.tarball = "https://github.com/h4ckf0r0day/obscura/releases/download/$ver/obscura-aarch64-macos.tar.gz"

[clashx-meta]
src.github = "MetaCubeX/ClashX.Meta"
fetch.tarball = "https://github.com/MetaCubeX/ClashX.Meta/releases/download/$ver/ClashX.Meta.zip"
